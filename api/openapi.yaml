openapi: 3.0.3
info:
  title: CoworkSpace — Feature 1 Reminders API
  description: API контракт для фічі "Нагадування за годину до початку бронювання"
  version: 2.0.0
  contact:
    name: КВ14736512

servers:
  - url: http://localhost:4000
    description: Local development server

tags:
  - name: reminders
    description: Операції з нагадуваннями

paths:
  /api/v1/bookings/{booking_id}/reminder:
    post:
      tags: [reminders]
      summary: Створити нагадування для бронювання
      description: >
        Якщо до початку >= 60 хвилин — статус scheduled (чекає).
        Якщо до початку < 60 хвилин — надсилає одразу, статус sent.
        Для одного бронювання може існувати тільки одне активне нагадування.
      operationId: createReminder
      security:
        - BearerAuth: [bookings:write]
      parameters:
        - name: booking_id
          in: path
          required: true
          description: Ідентифікатор бронювання
          schema:
            type: string
            format: uuid
          example: bkg_a1b2c3d4
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReminderRequest"
            example:
              channel: email
      responses:
        "201":
          description: Нагадування створено
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReminderResponse"
              example:
                reminder_id: rem_x1y2z3w4
                booking_id: bkg_a1b2c3d4
                status: scheduled
                scheduled_at: "2025-11-08T15:00:00Z"
                sent_at: null
                channel: email
        "400":
          description: Невалідні вхідні дані
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Не авторизований
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Немає прав — клієнт намагається створити нагадування для чужого бронювання
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Бронювання не знайдено
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Нагадування вже існує або бронювання скасоване
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    get:
      tags: [reminders]
      summary: Отримати нагадування для бронювання
      description: Повертає поточне нагадування. Email клієнта у відповіді відсутній — PII захищено.
      operationId: getReminder
      security:
        - BearerAuth: [bookings:read]
      parameters:
        - name: booking_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          example: bkg_a1b2c3d4
      responses:
        "200":
          description: Деталі нагадування
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReminderResponse"
              example:
                reminder_id: rem_x1y2z3w4
                booking_id: bkg_a1b2c3d4
                status: scheduled
                scheduled_at: "2025-11-08T15:00:00Z"
                sent_at: null
                channel: email
        "401":
          description: Не авторизований
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Немає прав на це нагадування
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Нагадування або бронювання не знайдено
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    patch:
      tags: [reminders]
      summary: Скасувати нагадування
      description: >
        Переводить нагадування в статус cancelled.
        Не можна скасувати вже надіслане нагадування (sent) — повертає 409.
      operationId: patchReminder
      security:
        - BearerAuth: [bookings:write]
      parameters:
        - name: booking_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchReminderRequest"
            example:
              status: cancelled
      responses:
        "200":
          description: Статус нагадування оновлено
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReminderResponse"
        "400":
          description: Невалідний статус
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Не авторизований
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Немає прав
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Нагадування не знайдено
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Неможливо скасувати — нагадування вже надіслано (sent є фінальним статусом)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    CreateReminderRequest:
      type: object
      required: [channel]
      properties:
        channel:
          type: string
          enum: [email]
          description: Канал надсилання — зараз підтримується тільки email
        message:
          type: string
          minLength: 1
          maxLength: 500
          description: Додатковий текст повідомлення (опційно)

    PatchReminderRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [cancelled]
          description: Єдиний дозволений перехід через API — скасування

    ReminderResponse:
      type: object
      properties:
        reminder_id:
          type: string
          description: Унікальний ідентифікатор нагадування
          example: rem_x1y2z3w4
        booking_id:
          type: string
          description: Ідентифікатор бронювання
          example: bkg_a1b2c3d4
        status:
          type: string
          enum: [scheduled, sent, cancelled]
          description: >
            scheduled — заплановано на майбутнє,
            sent — вже надіслано,
            cancelled — скасовано
        scheduled_at:
          type: string
          format: date-time
          description: Час запланованої відправки (ISO 8601 UTC)
          example: "2025-11-08T15:00:00Z"
        sent_at:
          type: string
          format: date-time
          nullable: true
          description: Час фактичної відправки або null якщо ще не надіслано
          example: null
        channel:
          type: string
          enum: [email]

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [error_code, message]
          properties:
            error_code:
              type: string
              description: Стабільний машинний код помилки — не змінюється між версіями
              example: reminder_already_exists
            message:
              type: string
              description: Зрозуміле повідомлення для користувача
              example: Нагадування для цього бронювання вже існує
            details:
              type: object
              description: Додаткові деталі про помилку
              additionalProperties:
                type: string
            trace_id:
              type: string
              description: ID запиту для пошуку в логах
              example: req_abc123
